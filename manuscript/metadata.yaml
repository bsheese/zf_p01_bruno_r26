---
title: "Short-term reliability of behavior in the zebrafish novel-tank test: a six-session reanalysis"
author: "Brad Sheese — Illinois Wesleyan University"
date: "June 2026"
abstract: |
  The novel-tank diving test is the most widely used assay of anxiety-like behavior in adult zebrafish, with the proportion of time spent in the upper half of the tank (pct_top) as its primary index. For this measure to index stable individual differences, it must be repeatable — yet most zebrafish repeatability estimates come from intervals of weeks to months, and short-term, within-days reliability is largely unexamined. We reanalyzed a six-session dataset (103 adult zebrafish tested twice daily over three days) with a newly built Python pipeline that re-implements our laboratory's earlier Mathematica analysis from the same distortion-corrected tracking. The new pipeline reproduced the original internal consistency (Cronbach's α = 0.855 across the six sessions; original α ≈ 0.88). Expressed as the single-measure repeatability standard in the animal-personality literature, pct_top showed *R* ≈ 0.50 per session; the composite α is simply the Spearman–Brown projection of that value over six sessions, and once placed on the same scale the estimate sits at the upper end of published (mostly long-interval) values. The first, novel exposure ranked individuals differently from all later sessions — repeatability rose to *R* ≈ 0.59 when it was excluded — consistent with acclimation before behavior stabilizes; within-day and day-to-day reliability likewise strengthened after the first day. Among additional measures, lateral movement range and swimming velocity were as repeatable as pct_top, transition frequency less so, and latency to first ascent least. We draw two practical recommendations: report novel-tank reliability as a variance-partitioned single-measure *R* with the number of sessions stated, not as a composite α or a raw test–retest correlation; and treat the first exposure as an acclimation session distinct from familiar-tank measurement. Two limitations bound interpretation: a within-days window measures short-term repeatability of among-individual differences, which need not reflect a lifelong personality trait and may include persistent post-handling or physiological state; and the original frame-differencing tracker does not register freezing (interpolation recovers within-session bottom freezes, but immobility is only partially observed).

  *Keywords:* zebrafish; novel-tank test; behavioral repeatability; short-term reliability; animal personality; intraclass correlation.
